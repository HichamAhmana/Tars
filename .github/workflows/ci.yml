name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (Django + engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install system audio libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev portaudio19-dev espeak
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run migrations (sanity)
        run: python manage.py migrate --noinput
      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: backend.settings
        run: pytest -q

  frontend:
    name: Frontend (Next.js dashboard)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
